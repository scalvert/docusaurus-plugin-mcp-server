<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Build Time -->
  <rect x="10" y="10" width="300" height="200" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="25" y="32" font-weight="600" fill="#166534" font-size="14">Build Time</text>
  <rect x="30" y="48" width="120" height="32" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="90" y="69" text-anchor="middle" fill="#374151">Docusaurus Build</text>
  <line x1="150" y1="64" x2="170" y2="64" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="180" y="48" width="110" height="32" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="235" y="69" text-anchor="middle" fill="#374151">postBuild Hook</text>
  <line x1="235" y1="80" x2="235" y2="95" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="60" y="100" width="120" height="32" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="120" y="121" text-anchor="middle" fill="#374151">Extract Content</text>
  <line x1="235" y1="116" x2="185" y2="116" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="60" y1="116" x2="40" y2="116" stroke="#64748b"/>
  <line x1="40" y1="116" x2="40" y2="165" stroke="#64748b"/>
  <line x1="40" y1="165" x2="55" y2="165" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="65" y="149" width="130" height="32" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="130" y="170" text-anchor="middle" fill="#374151">Build Search Index</text>
  <line x1="195" y1="165" x2="210" y2="165" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="220" y="149" width="75" height="32" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="257" y="170" text-anchor="middle" fill="#166534" font-weight="500">Output</text>

  <!-- Artifacts -->
  <rect x="330" y="10" width="150" height="200" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5"/>
  <text x="345" y="32" font-weight="600" fill="#854d0e" font-size="14">build/mcp/</text>
  <rect x="350" y="50" width="110" height="28" rx="5" fill="#fff" stroke="#d1d5db"/>
  <text x="405" y="69" text-anchor="middle" fill="#374151" font-size="12">docs.json</text>
  <rect x="350" y="90" width="110" height="28" rx="5" fill="#fff" stroke="#d1d5db"/>
  <text x="405" y="109" text-anchor="middle" fill="#374151" font-size="12">search-index.json</text>
  <rect x="350" y="130" width="110" height="28" rx="5" fill="#fff" stroke="#d1d5db"/>
  <text x="405" y="149" text-anchor="middle" fill="#374151" font-size="12">manifest.json</text>

  <!-- Arrow from Build to Artifacts -->
  <line x1="310" y1="110" x2="325" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Runtime -->
  <rect x="500" y="10" width="180" height="200" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="515" y="32" font-weight="600" fill="#1e40af" font-size="14">Runtime</text>
  <rect x="520" y="55" width="140" height="32" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="590" y="76" text-anchor="middle" fill="#374151">Serverless Function</text>
  <line x1="590" y1="87" x2="590" y2="105" stroke="#64748b" marker-end="url(#arrow)"/>
  <rect x="520" y="110" width="140" height="32" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="590" y="131" text-anchor="middle" fill="#1e40af" font-weight="500">MCP Server</text>

  <!-- Arrow from Artifacts to Runtime -->
  <line x1="480" y1="85" x2="515" y2="85" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Agents -->
  <rect x="700" y="10" width="190" height="200" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="715" y="32" font-weight="600" fill="#6b21a8" font-size="14">AI Agents</text>
  <rect x="720" y="55" width="150" height="28" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="795" y="74" text-anchor="middle" fill="#374151">Claude</text>
  <rect x="720" y="95" width="150" height="28" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="795" y="114" text-anchor="middle" fill="#374151">Cursor</text>
  <rect x="720" y="135" width="150" height="28" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="795" y="154" text-anchor="middle" fill="#374151">Other MCP Clients</text>

  <!-- Bidirectional arrow from Runtime to Agents -->
  <line x1="680" y1="126" x2="715" y2="126" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="715" y1="118" x2="680" y2="118" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="697" y="112" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="500">MCP</text>

  <!-- Legend line -->
  <text x="10" y="260" fill="#6b7280" font-size="12" font-style="italic">The plugin processes HTML at build time and serves it via MCP at runtime — no Docusaurus dependency needed at runtime.</text>
</svg>
